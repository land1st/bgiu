function setState(p){Object.assign(S,typeof p==='function'?p(S):p);render();}
function saveAll(){sv('bgiu_u',S.units);sv('bgiu_p',S.profile);sv('bgiu_s',S.settings);sv('bgiu_fid',S.driveFileId);}
function exportData(){
  const data={units:S.units,profile:S.profile,settings:S.settings,exportedAt:new Date().toISOString(),version:'1.0'};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download='bgiu_backup_'+date+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('\ub370\uc774\ud130\ub97c \ub0b4\ubcf4\ub0c8\uc5b4\uc694! ('+S.units.length+'\uac1c \uc720\ub2db)');
}
function importData(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.units||!Array.isArray(data.units)){toast('\uc62c\ubc14\ub974\uc9c0 \uc54a\uc740 \ud30c\uc77c\uc785\ub2c8\ub2e4');return;}
      setState({units:data.units,profile:data.profile||S.profile,settings:data.settings||S.settings});
      saveAll();applyTheme();
      toast('\uac00\uc838\uc654\uc5b4\uc694! ('+data.units.length+'\uac1c \uc720\ub2db)');
    }catch{toast('\ud30c\uc77c \uc77d\uae30 \uc2e4\ud328');}
  };
  reader.readAsText(file);
}

// ===== GOOGLE DRIVE SYNC =====
let _tokenClient=null;

function initGIS(){
  if(!window.google||!window.google.accounts)return;
  _tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){toast('\uad6c\uae00 \uc5f0\uacb0 \uc2e4\ud328: '+resp.error);setState({syncStatus:'error'});return;}
      S.gUser={...S.gUser,accessToken:resp.access_token};
      saveAll();
      toast('\uad6c\uae00 \ub85c\uadf8\uc778 \uc131\uacf5! \ub3d9\uae30\ud654 \uc911...');
      syncFromDrive();
    },
  });
}

function googleLogin(){
  if(!_tokenClient){
    // GSI not loaded yet, try init
    if(window.google&&window.google.accounts){initGIS();}
    else{toast('Google \uc778\uc99d \ub85c\ub529 \uc911...\uc7a0\uc2dc \ud6c4 \ub2e4\uc2dc \uc2dc\ub3c4\ud558\uc138\uc694');return;}
  }
  // Use Google Identity Services to get user info via id_token
  const idClient=google.accounts.id;
  idClient.initialize({
    client_id:CLIENT_ID,
    callback:(resp)=>{
      const payload=parseJwt(resp.credential);
      setState({gUser:{name:payload.name,email:payload.email,photo:payload.picture,accessToken:null}});
      sv('bgiu_guser',{name:payload.name,email:payload.email,photo:payload.picture});
      // Now get access token for Drive
      _tokenClient.requestAccessToken({prompt:''});
    },
    auto_select:false,
  });
  idClient.prompt((notification)=>{
    if(notification.isNotDisplayed()||notification.isSkippedMoment()){
      // popup fallback
      _tokenClient.requestAccessToken({prompt:'consent'});
    }
  });
}

function googleLoginDirect(){
  if(!window.google){toast('Google SDK \ub85c\ub529 \uc911...');return;}
  if(!_tokenClient)initGIS();
  if(!_tokenClient){toast('Google SDK \ub85c\ub529 \uc911... \uc7a0\uc2dc \ud6c4 \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694');return;}
  // Use popup sign-in
  google.accounts.id.initialize({
    client_id:CLIENT_ID,
    callback:(resp)=>{
      const payload=parseJwt(resp.credential);
      const gu={name:payload.name,email:payload.email,photo:payload.picture,accessToken:null};
      setState({gUser:gu});
      sv('bgiu_guser',gu);
      _tokenClient.requestAccessToken({prompt:''});
    },
    auto_select:false,
  });
  google.accounts.id.prompt();
}

function requestDriveToken(){
  if(!_tokenClient)initGIS();
  if(!_tokenClient){toast('Google SDK \uc900\ube44 \uc911...');return;}
  _tokenClient.requestAccessToken({prompt:'consent'});
}

function googleLogout(){
  if(S.gUser&&window.google){
    google.accounts.id.revoke(S.gUser.email,()=>{});
    if(S.gUser.accessToken)google.accounts.oauth2.revoke(S.gUser.accessToken,()=>{});
  }
  setState({gUser:null,syncStatus:'idle'});
  sv('bgiu_guser',null);
  toast('\uad6c\uae00 \ub85c\uadf8\uc544\uc6c3\ud588\uc5b4\uc694');
}

function parseJwt(token){
  try{
    const b=token.split('.')[1];
    const raw=atob(b.replace(/-/g,'+').replace(/_/g,'/'));
    // Properly decode UTF-8 (handles Korean and other non-ASCII)
    const utf8=decodeURIComponent(raw.split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(utf8);
  }catch{return {};}
}

// Drive API helpers
async function driveRequest(path,method='GET',body=null,contentType='application/json'){
  if(!S.gUser?.accessToken)return null;
  const opts={method,headers:{Authorization:'Bearer '+S.gUser.accessToken}};
  if(body){
    opts.headers['Content-Type']=contentType;
    opts.body=typeof body==='string'?body:JSON.stringify(body);
  }
  const r=await fetch('https://www.googleapis.com/'+path,opts);
  if(r.status===401){
    setState({gUser:{...S.gUser,accessToken:null}});
    toast('\uc138\uc158\uc774 \ub9cc\ub8cc\ub418\uc5c8\uc5b4\uc694. \ub2e4\uc2dc \ub85c\uadf8\uc778\ud574\uc8fc\uc138\uc694.');
    return null;
  }
  if(!r.ok)return null;
  try{return await r.json();}catch{return {};}
}

async function findDriveFile(){
  const res=await driveRequest("drive/v3/files?q=name%3D'"+DRIVE_FILE_NAME+"'+and+trashed%3Dfalse&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc");
  if(res&&res.files&&res.files.length>0)return res.files[0];
  return null;
}

async function readDriveFile(fileId){
  if(!S.gUser?.accessToken)return null;
  const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',{
    headers:{Authorization:'Bearer '+S.gUser.accessToken}
  });
  if(!r.ok)return null;
  try{return await r.json();}catch{return null;}
}

async function writeDriveFile(data){
  const jsonStr=JSON.stringify(data);
  const blob=new Blob([jsonStr],{type:'application/json'});
  if(S.driveFileId){
    // update
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+S.driveFileId+'?uploadType=media',{
      method:'PATCH',headers:{Authorization:'Bearer '+S.gUser.accessToken,'Content-Type':'application/json'},body:jsonStr
    });
    return r.ok;
  }else{
    // create new file in Drive
    const meta={name:DRIVE_FILE_NAME}; // saved to Drive root
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
    form.append('file',blob);
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{
      method:'POST',headers:{Authorization:'Bearer '+S.gUser.accessToken},body:form
    });
    if(r.ok){const j=await r.json();setState({driveFileId:j.id});sv('bgiu_fid',j.id);return true;}
    return false;
  }
}

async function syncToDrive(){
  if(!S.gUser?.accessToken){toast('\uba3c\uc800 \uad6c\uae00 \ub85c\uadf8\uc778\uc744 \ud574\uc8fc\uc138\uc694');return;}
  setState({syncStatus:'syncing'});
  try{
    const data={units:S.units,profile:S.profile,settings:S.settings,syncedAt:Date.now()};
    const ok=await writeDriveFile(data);
    if(ok){setState({syncStatus:'success'});toast('\u2601\ufe0f Drive \ub3d9\uae30\ud654 \uc644\ub8cc!');}
    else{setState({syncStatus:'error'});toast('\ub3d9\uae30\ud654 \uc2e4\ud328. \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694.');}
  }catch(e){setState({syncStatus:'error'});toast('\ub3d9\uae30\ud654 \uc624\ub958: '+e.message);}
}

async function syncFromDrive(){
  if(!S.gUser?.accessToken)return;
  setState({syncStatus:'syncing'});
  try{
    let fileId=S.driveFileId;
    if(!fileId){const f=await findDriveFile();if(f)fileId=f.id;}
    if(!fileId){
      // No file yet, push local data
      await syncToDrive();return;
    }
    setState({driveFileId:fileId});sv('bgiu_fid',fileId);
    const data=await readDriveFile(fileId);
    if(data&&data.units){
      setState({units:data.units,profile:data.profile||S.profile,settings:data.settings||S.settings,syncStatus:'success'});
      saveAll();applyTheme();
      toast('\u2601\ufe0f Drive\uc5d0\uc11c \ub370\uc774\ud130\ub97c \uac00\uc838\uc654\uc5b4\uc694!');
    }else{await syncToDrive();}
  }catch(e){setState({syncStatus:'error'});toast('\uac00\uc838\uc624\uae30 \uc2e4\ud328: '+e.message);}
}

let _autoSyncTimer=null;
function autoSync(){
  if(!S.gUser?.accessToken)return;
  if(_autoSyncTimer)clearTimeout(_autoSyncTimer);
  _autoSyncTimer=setTimeout(()=>syncToDrive(),2000);
}

// ===== DOM HELPERS =====
function e(tag,style,inner){
  const el=document.createElement(tag);
  if(style)Object.assign(el.style,style);
  if(typeof inner==='string')el.innerHTML=inner;
  else if(inner instanceof Node)el.appendChild(inner);
  else if(Array.isArray(inner))inner.forEach(c=>c&&el.appendChild(typeof c==='string'?Object.assign(document.createElement('span'),{innerHTML:c}):c));
  return el;
}
function d(style,inner){return e('div',style,inner);}
function tap(el,fn){
  el.style.cursor='pointer';el.style.WebkitTapHighlightColor='transparent';
  el.addEventListener('click',fn);
  el.addEventListener('mousedown',()=>el.style.transform='scale(0.97)');
  el.addEventListener('mouseup',()=>el.style.transform='');
  el.addEventListener('mouseleave',()=>el.style.transform='');
  el.addEventListener('touchstart',()=>el.style.transform='scale(0.97)',{passive:true});
  el.addEventListener('touchend',()=>el.style.transform='');
  return el;
}

function scrSession(uid){
  const a=ac();const unit=S.units.find(u=>u.id===uid);
  if(!unit||!unit.examples.length){const w=d({padding:'20px'});w.textContent='\uc608\ubb38\uc774 \uc5c6\uc5b4\uc694';return w;}
  const examples=unit.examples;let idx=0,inp='',revealed=false,scores=[];
  const w=d({display:'flex',flexDirection:'column',height:'100%'});
  function buildHdr(){
    const closeEl=d({fontSize:'15px',color:a,cursor:'pointer',minWidth:'60px'});closeEl.textContent='\ub2eb\uae30';tap(closeEl,pop);

    const{bar}=mkHdr(unit.title,closeEl,cntEl);return bar;

    w.innerHTML='';

      sc.appendChild(mkRing(160,pct/100,pct>=70?'var(--green)':a,10,'<div style="text-align:center"><div style="font-size:36px;font-weight:800">'+pct+'%</div><div style="font-size:12px;color:var(--t2)">\uc815\ub2f5\ub960</div></div>'));

      const gr=d({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',width:'100%',marginBottom:'28px'});
      [{l:'\uc815\ub2f5',v:correct,c:'var(--green)'},{l:'\uc624\ub2f5',v:total-correct,c:'var(--red)'},{l:'\uc804\uccb4',v:total,c:'var(--t1)'}].forEach(s=>{

      btns.appendChild(mkBtn('\ubcf5\uc2b5 \uc644\ub8cc','primary',()=>{const msg='\ubcf5\uc2b5 \uc644\ub8cc! \uc815\ub2f5\ub960 '+pct+'% '+(pct>=70?'\ud83c\udf89':'');goTab(S.activeTab==='review'?'review':'home');setTimeout(()=>toast(msg),100);}));

    }
    const ex=examples[idx];

    const ta=e('textarea',{width:'100%',background:'var(--bg2)',border:'1px solid var(--sep)',borderRadius:'14px',padding:'16px',fontSize:'15px',lineHeight:'1.6',marginBottom:'16px',color:'var(--t1)'});

function scrOnboarding(){
  const a=ac();
  let curIdx=0;
  const outer=d({position:'fixed',inset:'0',background:'var(--bg1)',zIndex:'1000',display:'flex',flexDirection:'column',maxWidth:'430px',margin:'0 auto'});

  // Skip button
  const skipBtn=d({position:'absolute',top:'20px',right:'20px',fontSize:'15px',color:'var(--t2)',cursor:'pointer',zIndex:'10',padding:'8px'});
  skipBtn.textContent='\uac74\ub108\ub6f0\uae30';
  tap(skipBtn,()=>{markOnboarded();outer.remove();render();});
  outer.appendChild(skipBtn);

  // Slides container
  const slidesWrap=d({flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 32px 0',textAlign:'center'});

  // Illus area
  const illusArea=d({marginBottom:'40px',width:'100%',display:'flex',justifyContent:'center'});

  // Text area
  const tagEl=d({fontSize:'13px',fontWeight:'600',color:a,letterSpacing:'0.4px',marginBottom:'10px'});
  const titleEl=d({fontSize:'32px',fontWeight:'800',letterSpacing:'-0.8px',lineHeight:'1.2',marginBottom:'14px',whiteSpace:'pre-line'});
  const descEl=d({fontSize:'15px',color:'var(--t2)',lineHeight:'1.65',whiteSpace:'pre-line'});

  slidesWrap.append(illusArea,tagEl,titleEl,descEl);
  outer.appendChild(slidesWrap);

  // Dots + button area
  const bottom=d({padding:'20px 24px',paddingBottom:'env(safe-area-inset-bottom, 28px)',display:'flex',flexDirection:'column',alignItems:'center',gap:'20px'});

  const dotsWrap=d({display:'flex',gap:'8px',alignItems:'center'});
  SLIDES.forEach((_,i)=>{
    const dot=d({width:i===0?'20px':'8px',height:'8px',borderRadius:'999px',
      background:i===0?a:'var(--bg4)',transition:'all 0.3s'});
    dotsWrap.appendChild(dot);
  });

  const nextBtn=d({width:'100%',padding:'16px',borderRadius:'14px',background:a,
    color:'#fff',fontSize:'17px',fontWeight:'700',textAlign:'center',cursor:'pointer',
    letterSpacing:'-0.3px',transition:'transform 0.12s',boxShadow:'0 4px 16px '+a+'55'});
  nextBtn.textContent='\ub2e4\uc74c';
  tap(nextBtn,()=>{
    if(curIdx<SLIDES.length-1){curIdx++;updateSlide();}
    else{markOnboarded();outer.remove();render();}
  });

  bottom.append(dotsWrap,nextBtn);outer.appendChild(bottom);

  function updateSlide(){
    const sl=SLIDES[curIdx];
    // Update illus
    illusArea.innerHTML='';
    illusArea.appendChild(mkIllus(sl.illus,a));
    // Update text
    tagEl.textContent=sl.tag;tagEl.style.color=a;
    titleEl.textContent=sl.title;
    descEl.textContent=sl.desc;
    // Update dots
    Array.from(dotsWrap.children).forEach((dot,i)=>{
      dot.style.background=i===curIdx?a:'var(--bg4)';
      dot.style.width=i===curIdx?'20px':'8px';
    });
    // Update button
    nextBtn.textContent=curIdx===SLIDES.length-1?'\uc2dc\uc791\ud558\uae30':'\ub2e4\uc74c';
    // Animate slide in
    slidesWrap.style.opacity='0';slidesWrap.style.transform='translateX(30px)';
    requestAnimationFrame(()=>{
      slidesWrap.style.transition='opacity 0.3s, transform 0.3s';
      slidesWrap.style.opacity='1';slidesWrap.style.transform='translateX(0)';
    });
  }

  // Touch swipe support
  let touchStartX=0;
  outer.addEventListener('touchstart',e=>touchStartX=e.touches[0].clientX,{passive:true});
  outer.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(dx<-50&&curIdx<SLIDES.length-1){curIdx++;updateSlide();}
    else if(dx>50&&curIdx>0){curIdx--;updateSlide();}
  });

  updateSlide();
  return outer;
}

  }else{render();}
}
